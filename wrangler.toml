name = "parapress"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# Static assets generated by OpenNext
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Public site URL (used by cron worker / RSS / canonical links). Not a secret; plaintext is fine.
[vars]
SITE_URL = "https://press.parapulse.io"

# D1: blog database. Fill in database_id after running `wrangler d1 create parapress`.
# migrations_dir points to ./migrations; run `wrangler d1 migrations apply` during CI deploy.
[[d1_databases]]
binding = "DB"
database_name = "parapress"
database_id = "8b4ef832-ef1d-415e-8115-76602030b39b"
migrations_dir = "migrations"

# R2: ISR incremental cache. Ready to use after `wrangler r2 bucket create parapress-cache`.
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "parapress-cache"

# REVALIDATE_SECRET is a secret; do not put it here.
# Set it with `wrangler secret put REVALIDATE_SECRET` (CI syncs it automatically, see .github/workflows).
